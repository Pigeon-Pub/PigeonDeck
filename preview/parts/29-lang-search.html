<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
  .dd{width:228px;padding:8px;overflow:hidden}
  /* 搜索框 */
  .srch{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;
    border:1px solid var(--c1-edge);box-shadow:0 0 0 3px var(--c1-soft);background:var(--cbg);margin-bottom:7px}
  .srch svg{width:15px;height:15px;color:var(--ctx2);flex:none}
  .srch input{flex:1;border:0;background:transparent;outline:none;font:13px var(--font-ui);color:var(--ctx)}
  .srch .cnt{font:11px var(--font-ui);color:var(--ctx2)}
  /* 语言列表 */
  /* 语言项：胶囊形（裁决12：语言选项统一药丸，与数值/文本按钮同族） */
  .opt{display:flex;align-items:center;gap:10px;padding:8px 13px;border-radius:999px;cursor:pointer}
  .opt:hover{background:var(--chv)}
  .opt.on{background:var(--c1-soft)}
  .opt .iso{width:30px;flex:none;font:600 10px var(--font-ui);letter-spacing:.5px;color:var(--ctx2);
    text-transform:uppercase}
  .opt .nm{font:13px var(--font-ui);color:var(--ctx)}
  .opt .nm mark{background:transparent;color:var(--c1);font-weight:600}
  .opt .sub{font-size:11px;color:var(--ctx2);margin-left:auto}
  .opt.on .chk{margin-left:auto;color:var(--c1)}
  .opt.on .chk svg{width:15px;height:15px}
  .opt.on .sub{display:none}
</style>
</head>
<body>
  <div class="wp">
    <div class="pd-surface dd">
      <!-- 搜索框：已输入「中」，实时筛选 -->
      <div class="srch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input value="中" readonly>
        <span class="cnt">1 项</span>
      </div>
      <!-- 命中项：简体中文，匹配字高亮 -->
      <div class="opt on">
        <span class="iso">zh</span>
        <span class="nm">简<mark>中</mark>文（简体）</span>
        <span class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      </div>
      <!-- 被筛掉的项，淡显示意（模糊/首字母/ISO 匹配） -->
      <div class="opt" style="opacity:.32">
        <span class="iso">en</span>
        <span class="nm">English</span>
        <span class="sub">English</span>
      </div>
    </div>
  </div>
</body>
</html>
