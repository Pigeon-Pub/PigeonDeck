<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
</style>
</head>
<body>
  <div class="wp">
    <pd-panel width="330">
      <div class="pbody pd-scroll">
        <textarea class="pd-textarea focused" placeholder="补充修改说明…">换成产品实拍图，并把圆角加大一点。</textarea>

        <!-- 修改栏：图片（控件 = 高级样式·尺寸/外观 同一原件） -->
        <pd-modbox title="修改栏 · 图片">
          <pd-prop field="replaceImg"></pd-prop>
          <div class="prop grid2">
            <pd-prop field="width" value="240" label="宽"></pd-prop>
            <pd-prop field="height" value="160" label="高"></pd-prop>
          </div>
          <div class="prop grid2">
            <pd-prop field="radius" value="12" diff="6→12"></pd-prop>
            <pd-prop field="border" value="无"></pd-prop>
          </div>
        </pd-modbox>

        <div class="adv">
          <span>高级样式</span>
          <span class="r"><span class="meta">排版 · 尺寸 · 外观 · 调试</span>
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </div>

      <pd-foot meta="③ · img · 240×160px"></pd-foot>
    </pd-panel>
  </div>
</body>
</html>
