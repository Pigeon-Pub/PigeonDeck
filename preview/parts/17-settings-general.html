<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
  .spanel{width:340px}
  .sel-w{width:150px}
</style>
</head>
<body>
  <div class="wp">
    <div class="pd-surface spanel">
      <div class="shead">
        <span class="t">设置</span>
        <button class="pd-iconbtn" title="关闭设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      </div>
      <div class="sbody">
        <pd-set-nav active="通用"></pd-set-nav>
        <div class="scon pd-scroll">
          <div class="scat">通用</div>
          <div class="pd-srow"><span class="k">界面语言</span>
            <pd-select class="sel-w" value="中文（简体）"></pd-select></div>
          <div class="pd-srow"><span class="k">主题</span>
            <div class="pd-seg accent icons">
              <button class="on" title="亮色"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.3 17.7-1.4 1.4"/><path d="m19.1 4.9-1.4 1.4"/></svg></button>
              <button title="暗色"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>
            </div></div>
          <div class="pd-srow"><span class="k">默认选择粒度</span>
            <div class="pd-seg"><button class="on">智能组件块</button><button>单元素</button></div></div>
          <div class="pd-srow"><span class="k">插件位置<small>悬浮球停靠点</small></span>
            <button class="pd-btn">重置位置</button></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
