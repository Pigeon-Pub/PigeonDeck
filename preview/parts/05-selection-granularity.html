<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
</style>
</head>
<body>
  <div class="wp">
    <h1 class="wp-h">移动模式 · 选中</h1>
    <p class="wp-sub">单击选中组件 · 拖八向句柄改尺寸（选择粒度在设置中调）</p>
    <div style="position:relative;display:inline-block;margin-top:16px">
      <div class="wp-card" style="width:228px">
        <div class="wp-row" style="margin-bottom:10px">
          <div class="wp-img" style="width:38px;height:38px"></div>
          <div>
            <div style="font-weight:600;color:#11161c">作品卡片</div>
            <div style="font-size:12px;color:#6b7280">容器 · 可整体移动</div>
          </div>
        </div>
        <p class="wp-p" style="margin:0">这是一个可被选中并移动的视觉组件块。</p>
      </div>
      <!-- 选中框 + 八向缩放句柄（四角 + 四边中点） -->
      <div class="pd-selbox" style="inset:-2px">
        <span class="h tl"></span><span class="h tr"></span><span class="h bl"></span><span class="h br"></span>
        <span class="h tm"></span><span class="h bm"></span><span class="h ml"></span><span class="h mr"></span>
      </div>
    </div>
  </div>
</body>
</html>
