<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0;background:#17171c}
</style>
</head>
<body>
  <div class="wp">
    <pd-panel width="330">
      <div class="pbody pd-scroll">
        <textarea class="pd-textarea focused" placeholder="补充修改说明…">把标题文案改得更有紧迫感，并把字号加大、整体居中。</textarea>

        <pd-modbox title="修改栏 · 文本元素">
          <pd-prop field="text" value="限时优惠 · 今日截止"></pd-prop>
          <div class="prop grid2">
            <pd-prop field="fontSize" value="32" diff="24→32"></pd-prop>
            <pd-prop field="fontWeight" value="600 半粗"></pd-prop>
          </div>
          <pd-prop field="color" value="#ce9d4a"></pd-prop>
          <pd-prop field="align" value="center" diff="左→居中"></pd-prop>
        </pd-modbox>

        <div class="adv">
          <span>高级样式</span>
          <span class="r"><span class="meta">排版 · 尺寸 · 外观 · 调试</span>
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </div>

      <pd-foot gran meta="② · h2 · 220×34px"></pd-foot>
    </pd-panel>
  </div>
</body>
</html>
