<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
  .spanel{width:340px;display:flex;flex-direction:column;overflow:hidden}
  .shead{display:flex;align-items:center;justify-content:space-between;
    padding:10px 9px 10px 14px;border-bottom:1px solid var(--cbd)}
  .shead .t{font-family:var(--font-serif);font-weight:600;font-size:15px;color:var(--ctx)}
  /* 左导航 + 右内容；长度随分类内容收敛，不再是一长条 */
  .sbody{display:flex;gap:12px;padding:10px 14px 12px 8px}
  .sbody .pd-nav{width:42px}
  .scon{flex:1;min-width:0;max-height:300px;overflow:auto}
  .scat{font:600 11px var(--font-ui);letter-spacing:.6px;text-transform:uppercase;
    color:var(--ctx2);margin:1px 0 4px}
  .num-w{width:118px}
  .num-w input{padding-left:13px;padding-right:4px}
  .pd-seg.sm button{padding:5px 11px;font-size:11px}
</style>
</head>
<body>
  <div class="wp">
    <div class="pd-surface spanel">
      <div class="shead">
        <span class="t">设置</span>
        <button class="pd-iconbtn" title="关闭设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      </div>
      <div class="sbody">
        <!-- 左：分类导航，圆形选中 -->
        <div class="pd-nav">
          <button><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg></span>通用</button>
          <button class="on"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12.6 2.5a2 2 0 0 0-3 1.7v14.6a2 2 0 0 0 3.4 1.4l3-3 1.8 4a1.5 1.5 0 0 0 2.7-1.3l-1.8-4h4.2a2 2 0 0 0 1.4-3.4Z"/></svg></span>交互</button>
          <button><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg></span>输出</button>
          <button><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg></span>帮助</button>
        </div>
        <!-- 右：交互分类内容（无逐行横线，靠留白分隔） -->
        <div class="scon pd-scroll">
          <div class="scat">交互</div>
          <div class="pd-srow"><span class="k">长按时长<small>区域框选触发</small></span>
            <div class="pd-num num-w"><input value="300"><span class="step"><button>+</button><button>−</button></span><span class="unit">ms</span></div></div>
          <div class="pd-srow"><span class="k">拖拽防误触阈值</span>
            <div class="pd-num num-w"><input value="0"><span class="step"><button>+</button><button>−</button></span><span class="unit">ms</span></div></div>
          <div class="pd-srow"><span class="k">撤销历史上限</span>
            <div class="pd-num num-w"><input value="50"><span class="step"><button>+</button><button>−</button></span><span class="unit">步</span></div></div>
          <div class="pd-srow"><span class="k">标注卡片默认展开</span>
            <button class="pd-switch" aria-pressed="false"></button></div>
          <div class="pd-srow"><span class="k">元素 hover 标签</span>
            <button class="pd-switch on" aria-pressed="true"></button></div>
          <div class="pd-srow"><span class="k">快捷键<small>展开态生效</small></span>
            <button class="pd-btn">Ctrl+Z / ⇧+Z</button></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
