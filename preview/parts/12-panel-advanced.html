<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
</style>
</head>
<body>
  <div class="wp">
    <pd-panel width="330">
      <div class="pbody pd-scroll">
        <textarea class="pd-textarea" placeholder="补充修改说明…">把卡片背景换成品牌金，圆角更柔、略降不透明度。</textarea>

        <div class="adv-head">
          <span>高级样式</span>
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>

        <pd-advbox active="外观" badges="排版:1,外观:3">
          <pd-prop field="bgColor" value="#b8842c" diff="#fafafa→#b8842c"></pd-prop>
          <pd-prop field="bgImage"></pd-prop>
          <div class="prop grid2">
            <pd-prop field="border" value="无"></pd-prop>
            <pd-prop field="radius" value="12" diff="7→12"></pd-prop>
          </div>
          <pd-prop field="borderColor" value="#d9d3c4"></pd-prop>
          <pd-prop field="shadow" diff="无→轻"></pd-prop>
          <pd-prop field="shadowColor" value="#3c2e12" alpha="22"></pd-prop>
          <pd-prop field="opacity" value="92"></pd-prop>
          <pd-prop field="blur" value="0"></pd-prop>
        </pd-advbox>
      </div>

      <pd-foot meta="③ · div.card · 248×120px"></pd-foot>
    </pd-panel>
  </div>
</body>
</html>
