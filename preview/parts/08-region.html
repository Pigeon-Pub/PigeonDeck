<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
  .rpanel{position:absolute;left:206px;top:96px;width:158px;padding:10px}
  /* 输入框随文本数量自适应增高，不出现滚动条 */
  .rpanel .rin{width:100%;box-sizing:border-box;font:12px var(--font-ui);color:var(--ctx);
    background:var(--cbg);border:1px solid var(--cbd);border-radius:var(--r-ctl);
    padding:8px 10px;line-height:1.5;resize:none;outline:none;
    field-sizing:content;min-height:38px;overflow:hidden}
  .rpanel .rrow{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:8px}
  .rpanel .pd-btn{min-height:26px;padding:0 11px;font-size:11px}
  .rpanel .pd-iconbtn{width:26px;height:26px}
</style>
</head>
<body>
  <div class="wp">
    <h1 class="wp-h">区域批注</h1>
    <p class="wp-sub">长按 ≥300ms 后拖拽框选区域</p>
    <div class="wp-card" style="position:absolute;left:18px;top:62px;width:150px;height:118px;padding:12px">
      <div style="font-weight:600;color:#11161c;font-size:13px;margin-bottom:6px">特性区</div>
      <p class="wp-p" style="font-size:12px;margin:0">三个并排的特性卡，间距偏挤。</p>
    </div>

    <!-- 区域框 + 区域编号 -->
    <div class="pd-region" style="left:14px;top:58px;width:160px;height:128px"></div>
    <div class="pd-pin" style="left:6px;top:50px">3</div>

    <!-- 连线 -->
    <svg class="pd-connector" style="left:0;top:0;width:100%;height:100%">
      <line x1="174" y1="120" x2="206" y2="112"/>
    </svg>

    <!-- 小型区域批注面板 -->
    <div class="pd-surface rpanel">
      <textarea class="rin" rows="1">这一块整体留白太挤，三张卡之间加大间距。</textarea>
      <div class="rrow">
        <button class="pd-iconbtn danger" title="删除区域批注"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        <button class="pd-btn primary">保存</button>
      </div>
    </div>
  </div>
</body>
</html>
