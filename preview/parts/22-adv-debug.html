<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
  .dom-h{font:600 10px var(--font-ui);letter-spacing:.5px;text-transform:uppercase;
    color:var(--ctx2);margin:0 0 6px}
  .kv{display:flex;justify-content:space-between;gap:10px;font:11.5px var(--font-ui);padding:3px 0}
  .kv .k{color:var(--ctx2)}
  .kv .v{color:var(--ctx);font-variant-numeric:tabular-nums;text-align:right;word-break:break-all}
  .kv .v code{font:11px ui-monospace,Consolas,monospace;color:var(--c1)}
  .csgrp{margin-top:11px}
  .cslist{max-height:150px;overflow:auto;border-top:1px solid var(--cbd);padding-top:6px}
  .csrow{display:flex;justify-content:space-between;gap:10px;font:11px ui-monospace,Consolas,monospace;padding:3px 0}
  .csrow .p{color:var(--ctx2)}
  .csrow .val{color:var(--ctx)}
</style>
</head>
<body>
  <div class="wp">
    <pd-panel width="330">
      <div class="pbody pd-scroll">
        <textarea class="pd-textarea">Read-only inspector — verify the element's actual computed style.</textarea>

        <div class="adv-head">
          <span>高级样式</span>
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>

        <!-- 调试默认全英文；导航 调试 下方多一个「翻译」图标，点它切中文（见翻译态卡） -->
        <pd-advbox active="调试" translate>
          <div class="dom-h">DOM INFO</div>
          <div class="kv"><span class="k">tagName</span><span class="v"><code>div</code></span></div>
          <div class="kv"><span class="k">class</span><span class="v"><code>card price-card</code></span></div>
          <div class="kv"><span class="k">id</span><span class="v"><code>plan-std</code></span></div>
          <div class="kv"><span class="k">attributes</span><span class="v"><code>data-tier="std"</code></span></div>
          <div class="csgrp">
            <div class="dom-h">COMPUTED STYLE</div>
            <div class="cslist pd-scroll">
              <div class="csrow"><span class="p">display</span><span class="val">flex</span></div>
              <div class="csrow"><span class="p">width</span><span class="val">240px</span></div>
              <div class="csrow"><span class="p">height</span><span class="val">128px</span></div>
              <div class="csrow"><span class="p">padding</span><span class="val">16px</span></div>
              <div class="csrow"><span class="p">margin</span><span class="val">0 0 12px</span></div>
              <div class="csrow"><span class="p">border</span><span class="val">1px solid #e7e9ee</span></div>
              <div class="csrow"><span class="p">border-radius</span><span class="val">10px</span></div>
              <div class="csrow"><span class="p">box-shadow</span><span class="val">0 1px 2px …</span></div>
              <div class="csrow"><span class="p">font-size</span><span class="val">13px</span></div>
              <div class="csrow"><span class="p">color</span><span class="val">#3a4250</span></div>
              <div class="csrow"><span class="p">position</span><span class="val">static</span></div>
            </div>
          </div>
        </pd-advbox>
      </div>

      <pd-foot meta="① · div.card · 240×128px"></pd-foot>
    </pd-panel>
  </div>
</body>
</html>
