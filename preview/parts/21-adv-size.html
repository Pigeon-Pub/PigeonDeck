<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
</style>
</head>
<body>
  <div class="wp">
    <pd-panel width="330">
      <div class="pbody pd-scroll">
        <textarea class="pd-textarea" placeholder="补充修改说明…">卡片宽度收窄到 240，改为弹性布局。</textarea>

        <div class="adv-head">
          <span>高级样式</span>
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>

        <pd-advbox active="尺寸" badges="尺寸:2">
          <div class="prop grid2">
            <pd-prop field="width" value="240" diff="280→240"></pd-prop>
            <pd-prop field="height" value="auto"></pd-prop>
          </div>
          <div class="prop grid2">
            <pd-prop field="minW" value="160"></pd-prop>
            <pd-prop field="maxW" value="320"></pd-prop>
          </div>
          <pd-prop field="display" value="flex" diff="块级→弹性"></pd-prop>
          <pd-prop field="overflow" value="可见"></pd-prop>
        </pd-advbox>
      </div>

      <pd-foot gran meta="④ · div.card · 240×auto"></pd-foot>
    </pd-panel>
  </div>
</body>
</html>
