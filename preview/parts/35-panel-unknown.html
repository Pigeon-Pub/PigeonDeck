<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
  .panel{width:330px;display:flex;flex-direction:column;overflow:hidden}
  .pbody{padding:12px 12px 11px}
  .panel .pd-textarea{min-height:50px;margin-bottom:11px}
  .modbox{border:1px solid var(--cbd);border-radius:var(--r-card);background:var(--cbg);padding:11px}
  .modbox-h{font:600 10.5px var(--font-ui);letter-spacing:.5px;text-transform:uppercase;
    color:var(--ctx2);margin-bottom:9px;display:flex;align-items:center;gap:6px}
  .modbox-h::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--c1)}
  /* 自动适配说明条 */
  .autonote{display:flex;gap:7px;align-items:flex-start;padding:7px 9px;margin-bottom:11px;
    border-radius:var(--r-ctl);background:var(--c1-soft);border:1px solid var(--c1-edge);
    font:11.5px/1.45 var(--font-ui);color:var(--ctx)}
  .autonote svg{width:14px;height:14px;color:var(--c1);flex:none;margin-top:1px}
  .auto{font:600 9px var(--font-ui);color:var(--c1);background:var(--c1-soft);
    border:1px solid var(--c1-edge);border-radius:999px;padding:1px 6px;margin-left:6px;vertical-align:middle}
  .prop + .prop{margin-top:11px}
  .prop-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
  .prop-h .t{font:600 12px var(--font-ui);color:var(--ctx);display:flex;align-items:center}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid2>div{min-width:0}
  .adv{display:flex;align-items:center;justify-content:space-between;width:100%;box-sizing:border-box;
    margin-top:11px;padding:10px 11px;border:1px solid var(--cbd);border-radius:var(--r-ctl);
    background:var(--cbg);cursor:pointer;font:500 12px var(--font-ui);color:var(--ctx)}
  .adv .meta{font-size:11px;color:var(--ctx2)}
  .adv .r{display:flex;align-items:center;gap:8px}
  .pfoot{display:flex;align-items:center;justify-content:space-between;
    padding:8px 9px 8px 13px;border-top:1px solid var(--cbd);background:var(--cbg)}
  .pfoot .meta{font:11px var(--font-ui);color:var(--ctx2);font-variant-numeric:tabular-nums}
  .pfoot .acts{display:flex;align-items:center;gap:6px}
  .pfoot .pd-btn{min-height:28px;padding:0 13px}
</style>
</head>
<body>
  <div class="wp">
    <div class="pd-surface panel">
      <div class="pbody pd-scroll">
        <textarea class="pd-textarea focused" placeholder="补充修改说明…">这块区域底色和内边距想再调一下。</textarea>

        <!-- 修改栏：陌生元素自适配（统一高级样式风格） -->
        <div class="modbox">
          <div class="modbox-h">修改栏 · 自动适配</div>
          <div class="autonote">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            未匹配到固定类型（section），已按当前 CSS 自动列出最相关的可调项。
          </div>
          <div class="prop">
            <div class="prop-h"><span class="t">背景色<span class="auto">自动</span></span></div>
            <div class="pd-color">
              <button class="sw" style="background:#f4efe2"></button>
              <input class="val" value="#f4efe2">
              <button class="eye" title="取色"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/></svg></button>
            </div>
          </div>
          <div class="prop">
            <div class="grid2">
              <div>
                <div class="prop-h"><span class="t">内边距<span class="auto">自动</span></span></div>
                <div class="pd-num"><input value="24"><span class="step"><button>+</button><button>−</button></span><span class="unit">px</span></div>
              </div>
              <div>
                <div class="prop-h"><span class="t">圆角<span class="auto">自动</span></span></div>
                <div class="pd-num"><input value="0"><span class="step"><button>+</button><button>−</button></span><span class="unit">px</span></div>
              </div>
            </div>
          </div>
          <div class="prop">
            <div class="prop-h"><span class="t">显示<span class="auto">自动</span></span></div>
            <div class="pd-seg accent icons">
              <button class="on" title="块级 block"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/></svg></button>
              <button title="弹性 flex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" x2="9" y1="3" y2="21"/><line x1="15" x2="15" y1="3" y2="21"/></svg></button>
              <button title="网格 grid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="3" y2="21"/><line x1="15" x2="15" y1="3" y2="21"/></svg></button>
              <button title="行内 inline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="6" y2="6"/><path d="M3 12h15a3 3 0 1 1 0 6h-4"/><polyline points="16 16 14 18 16 20"/><line x1="3" x2="11" y1="18" y2="18"/></svg></button>
            </div>
          </div>
        </div>

        <div class="adv">
          <span>高级样式</span>
          <span class="r"><span class="meta">全部属性见调试页</span>
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </div>

      <div class="pfoot">
        <span class="meta">⑤ · section · 680×320px</span>
        <span class="acts">
          <button class="pd-iconbtn danger" title="删除批注"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          <button class="pd-btn primary">保存</button>
        </span>
      </div>
    </div>
  </div>
</body>
</html>
