<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
  .spanel{width:340px}
  .about{display:flex;align-items:center;gap:10px;padding:9px 0 2px}
  .about .ball{width:30px;height:30px;border-radius:50%;background:var(--c1);flex:none;
    display:flex;align-items:center;justify-content:center;color:#fdf6e6}
  .about .ball svg{width:17px;height:17px}
  .about .nm{font-family:var(--font-serif);font-weight:600;font-size:14px;color:var(--ctx)}
  .about .ver{font-size:11px;color:var(--ctx2);margin-top:1px}
</style>
</head>
<body>
  <div class="wp">
    <div class="pd-surface spanel">
      <div class="shead">
        <span class="t">设置</span>
        <button class="pd-iconbtn" title="关闭设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      </div>
      <div class="sbody">
        <pd-set-nav active="帮助"></pd-set-nav>
        <div class="scon pd-scroll">
          <div class="scat">帮助</div>
          <div class="pd-srow"><span class="k">安装说明页<small>快速上手教程</small></span>
            <button class="pd-btn">打开</button></div>
          <div class="pd-srow"><span class="k">检查更新<small>当前已是最新</small></span>
            <button class="pd-btn">检查</button></div>
          <div class="pd-srow"><span class="k">反馈与问题</span>
            <button class="pd-btn">提交反馈</button></div>
          <div class="about">
            <span class="ball"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.6 15.2Q10 9.2 17 10.1Q12.8 14.2 7.4 16.1Q5.7 16.6 4.6 15.2ZM9 12.6Q12 5.9 18.8 5Q16.4 9.8 12.4 11.7Q10.5 12.7 9 12.6ZM16.7 10L20.4 8.9 17.2 11.4Z"/></svg></span>
            <div><div class="nm">PigeonDeck</div><div class="ver">版本 1.0.0 · V1</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
