<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
  .spanel{width:340px}
</style>
</head>
<body>
  <div class="wp">
    <div class="pd-surface spanel">
      <div class="shead">
        <span class="t">设置</span>
        <button class="pd-iconbtn" title="关闭设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      </div>
      <div class="sbody">
        <pd-set-nav active="输出"></pd-set-nav>
        <div class="scon pd-scroll">
          <div class="scat">输出</div>
          <div class="pd-srow"><span class="k">导出语言<small>复制文本默认语言</small></span>
            <div class="pd-seg accent"><button class="on">英文</button><button>中文</button><button>跟随</button></div></div>
          <div class="pd-srow"><span class="k">复制图片方式</span>
            <div class="pd-seg accent icons">
              <button class="on" title="复制到剪贴板"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg></button>
              <button title="下载为文件"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></button>
            </div></div>
          <div class="pd-srow"><span class="k">图片元数据水印<small>URL · 时间</small></span>
            <button class="pd-switch" aria-pressed="false"></button></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
