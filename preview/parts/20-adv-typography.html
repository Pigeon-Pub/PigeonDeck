<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
</style>
</head>
<body>
  <div class="wp">
    <pd-panel width="330">
      <div class="pbody pd-scroll">
        <textarea class="pd-textarea" placeholder="补充修改说明…">标题字号加大、字重提到 600、整体居中。</textarea>

        <div class="adv-head">
          <span>高级样式</span>
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>

        <pd-advbox active="排版" badges="排版:3">
          <pd-prop field="font"></pd-prop>
          <div class="prop grid2">
            <pd-prop field="fontSize" value="32" diff="24→32"></pd-prop>
            <pd-prop field="fontWeight" value="600 半粗" diff="500→600"></pd-prop>
          </div>
          <pd-prop field="color" value="#23262e"></pd-prop>
          <pd-prop field="align" value="center" diff="左→居中"></pd-prop>
          <pd-prop field="decoration" value="b"></pd-prop>
          <div class="prop grid2">
            <pd-prop field="lineHeight" value="1.4"></pd-prop>
            <pd-prop field="letter" value="0.2"></pd-prop>
          </div>
          <div class="prop grid2">
            <pd-prop field="listStyle" value="无"></pd-prop>
            <pd-prop field="transform" value="原样"></pd-prop>
          </div>
          <div class="prop grid2">
            <pd-prop field="margin" value="12"></pd-prop>
            <pd-prop field="padding" value="8"></pd-prop>
          </div>
        </pd-advbox>
      </div>

      <pd-foot meta="② · h2 · 220×34px"></pd-foot>
    </pd-panel>
  </div>
</body>
</html>
