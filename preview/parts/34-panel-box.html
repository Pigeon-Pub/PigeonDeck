<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<script src="../pigeon-components.js" defer></script>
<style>
  html,body{margin:0;height:100%}
  .wp{display:flex;align-items:center;justify-content:center;padding:0}
</style>
</head>
<body>
  <div class="wp">
    <pd-panel width="330">
      <div class="pbody pd-scroll">
        <textarea class="pd-textarea focused" placeholder="补充修改说明…">主按钮换品牌金、圆角更柔、加一点阴影。</textarea>

        <!-- 修改栏：按钮/容器（控件 = 高级样式同一原件） -->
        <pd-modbox title="修改栏 · 按钮 / 容器">
          <pd-prop field="bgColor" value="#b8842c" diff="#2563eb→#b8842c"></pd-prop>
          <div class="prop grid2">
            <pd-prop field="radius" value="12" diff="6→12"></pd-prop>
            <pd-prop field="border" value="无"></pd-prop>
          </div>
          <pd-prop field="shadow" diff="无→轻"></pd-prop>
          <pd-prop field="opacity" value="100"></pd-prop>
          <div class="prop grid2">
            <pd-prop field="margin" value="0"></pd-prop>
            <pd-prop field="padding" value="14"></pd-prop>
          </div>
        </pd-modbox>

        <div class="adv">
          <span>高级样式</span>
          <span class="r"><span class="meta">排版 · 尺寸 · 外观 · 调试</span>
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </div>

      <pd-foot meta="④ · button.cta · 132×40px"></pd-foot>
    </pd-panel>
  </div>
</body>
</html>
