<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
  .wp{padding:22px}
  .stage{position:relative;display:inline-block;margin-top:96px}
  /* 右键菜单从位号圆上弹，箭头指回位号圆，不遮卡片 */
  .menu{position:absolute;left:-10px;bottom:calc(100% + 14px);z-index:5}
  .menu .arrow{position:absolute;left:22px;bottom:-6px;width:12px;height:12px;
    background:var(--csf);border-right:1px solid var(--cbd);border-bottom:1px solid var(--cbd);
    transform:rotate(45deg)}
</style>
</head>
<body>
  <div class="wp">
    <h1 class="wp-h">右键位号圆</h1>
    <p class="wp-sub">菜单从位号圆上弹 · 箭头指回 · 不遮卡片</p>

    <div class="stage">
      <div class="wp-card" style="width:236px">
        <div style="font-weight:600;color:#11161c;margin-bottom:6px">价格说明</div>
        <p class="wp-p" style="margin:0">标准版每月 ¥39，含基础导出。</p>
      </div>
      <!-- 标注框 + 位号圆 -->
      <div class="pd-markbox" style="inset:-3px"></div>
      <div class="pd-pin" style="left:-11px;top:-11px">1</div>

      <!-- 上弹的上下文菜单 -->
      <div class="pd-menu menu">
        <button class="pd-menu-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>
          修改批注
        </button>
        <div class="pd-menu-sep"></div>
        <button class="pd-menu-item danger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          删除批注
        </button>
        <span class="arrow"></span>
      </div>
    </div>
  </div>
</body>
</html>
