<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,340;0,9..144,500;0,9..144,600;1,9..144,380&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1e22;
    --gold:#b8842c;
    --muted:#8a7c5e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:400px}
  .banner{
    position:relative;
    width:1280px;height:400px;
    background:#ffffff;
    overflow:hidden;
    font-family:'Fraunces',Georgia,serif;
  }

  /* enlarged, blurred logo watermark — stays on the right (unchanged) */
  .wm{
    position:absolute;
    right:-120px;top:50%;
    width:940px;height:940px;
    transform:translateY(-50%) rotate(-6deg);
    color:var(--gold);
    opacity:.09;
    filter:blur(15px);
    pointer-events:none;
  }
  .wm svg{width:100%;height:100%}

  .halo{
    position:absolute;
    right:20px;top:50%;
    width:560px;height:560px;
    transform:translateY(-50%);
    background:radial-gradient(circle at center,rgba(184,132,44,.06),rgba(184,132,44,0) 68%);
    pointer-events:none;
  }

  .row{position:relative;height:100%;display:flex;align-items:center}

  /* wordmark block, nudged right to balance the left mark */
  .lockup{
    position:absolute;
    left:50%;top:50%;
    transform:translate(-42%,-50%);
    text-align:left;
  }
  .kicker{
    font-family:'Fraunces',serif;
    font-weight:500;font-size:14.5px;
    letter-spacing:.42em;text-transform:uppercase;
    color:var(--gold);margin-left:5px;margin-bottom:20px;
  }
  .wordmark{
    font-weight:340;font-size:118px;line-height:.92;
    letter-spacing:-.028em;color:var(--ink);
    font-optical-sizing:auto;
  }
  .wordmark b{font-weight:600}
  .tagline{
    margin-top:22px;margin-left:6px;
    font-style:italic;font-weight:380;font-size:25px;
    letter-spacing:.005em;color:var(--muted);
  }
  .rule{margin-top:22px;margin-left:6px;width:74px;height:2px;background:var(--gold);opacity:.85}

  /* crisp, shadowed mark — moved to the LEFT, no plate */
  .mark{
    position:absolute;
    left:132px;top:50%;
    width:196px;height:196px;
    transform:translateY(-50%);
    color:var(--gold);
    filter:drop-shadow(0 14px 26px rgba(184,132,44,.22)) drop-shadow(0 3px 6px rgba(28,30,34,.10));
  }
  .mark svg{width:100%;height:100%}
</style>
</head>
<body>
  <div class="banner">
    <div class="halo"></div>
    <div class="wm">
      <svg viewBox="0 0 630.367 618.433" fill="none" stroke="currentColor" stroke-width="35" stroke-linecap="round" stroke-linejoin="round"><path d="M78 387.5C152.631 368.891 76.4167 392.232 49.7159 390.136C29.1717 388.523 9.13425 371.072 2.55369 390.136C-12.5464 433.88 43.4887 557.5 61.4994 557.5C97.5603 557.5 95.1332 499.399 184.592 475.119C256.159 455.694 409.626 508.071 456.782 345.043C503.939 182.015 572.94 180.281 582.476 175.078C592.011 169.875 556.99 105.184 472.386 130.853C450.907 137.369 435.465 148.71 424.171 156.868C399.875 174.416 397.5 180 389 185.5C380.5 191 368.5 203 313.753 182.016C259.005 161.031 242.331 146.042 189.5 107C156.829 82.8558 176 96.4999 75.369 10.3161C-25.262 -75.8676 145.757 407.479 184.592 365.855C197.353 352.189 196.253 346.982 199.328 332.903C205.612 304.136 206.358 271.572 217.532 286.943C224.842 296.998 237.881 316.154 248.739 335.504C262.601 360.21 276.478 376.261 284.28 374.527C292.081 372.793 325.888 347.298 325.888 335.504C325.888 331.568 324.906 329.488 317.921 320.623C315.251 317.234 311.705 312.855 307 307C287.143 282.288 243.751 226.465 280 273" transform="matrix(0.996195,-0.0871557,0.0871557,0.996195,0,50.899)"/></svg>
    </div>

    <div class="row">
      <div class="mark">
        <svg viewBox="0 0 630.367 618.433" fill="none" stroke="currentColor" stroke-width="35" stroke-linecap="round" stroke-linejoin="round"><path d="M78 387.5C152.631 368.891 76.4167 392.232 49.7159 390.136C29.1717 388.523 9.13425 371.072 2.55369 390.136C-12.5464 433.88 43.4887 557.5 61.4994 557.5C97.5603 557.5 95.1332 499.399 184.592 475.119C256.159 455.694 409.626 508.071 456.782 345.043C503.939 182.015 572.94 180.281 582.476 175.078C592.011 169.875 556.99 105.184 472.386 130.853C450.907 137.369 435.465 148.71 424.171 156.868C399.875 174.416 397.5 180 389 185.5C380.5 191 368.5 203 313.753 182.016C259.005 161.031 242.331 146.042 189.5 107C156.829 82.8558 176 96.4999 75.369 10.3161C-25.262 -75.8676 145.757 407.479 184.592 365.855C197.353 352.189 196.253 346.982 199.328 332.903C205.612 304.136 206.358 271.572 217.532 286.943C224.842 296.998 237.881 316.154 248.739 335.504C262.601 360.21 276.478 376.261 284.28 374.527C292.081 372.793 325.888 347.298 325.888 335.504C325.888 331.568 324.906 329.488 317.921 320.623C315.251 317.234 311.705 312.855 307 307C287.143 282.288 243.751 226.465 280 273" transform="matrix(0.996195,-0.0871557,0.0871557,0.996195,0,50.899)"/></svg>
      </div>

      <div class="lockup">
        <div class="kicker">Browser Extension</div>
        <div class="wordmark">Pigeon<b>Deck</b></div>
        <div class="tagline">Annotate the web — hand it to your AI.</div>
        <div class="rule"></div>
      </div>
    </div>
  </div>
</body>
</html>
